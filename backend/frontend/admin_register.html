<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blue Pulse — Admin Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;background:linear-gradient(135deg,#f8fafc,#f1f5f9);min-height:100vh}
    .card{background:white;border-radius:1rem;padding:2rem;box-shadow:0 12px 30px rgba(2,6,23,0.06)}
    .input-field{width:100%;padding:.75rem 1rem;border:2px solid #e2e8f0;border-radius:.5rem}
    .btn-accent{background:#fbbf24;color:#1e3a8a;padding:.75rem;border-radius:.5rem;border:none;width:100%}
    .back-link{color:#3b82f6;text-decoration:none;display:inline-flex;gap:.5rem;margin-bottom:1.5rem}
    .label{display:block;margin-bottom:.5rem;font-weight:500;color:#1e293b}
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <a href="index.html" class="back-link">← Back to Home</a>
      <div class="card">
        <div class="text-center mb-6">
          <div style="width:64px;height:64px;border-radius:1rem;background:linear-gradient(135deg,#fbbf24,#f59e0b);margin:0 auto 12px"></div>
          <h2 class="text-2xl font-bold">Admin Portal</h2>
          <p class="text-gray-600">Register as an administrator (requires secret key)</p>
        </div>

        <!-- ONLY the DB fields: email + password, plus secret_key for admin validation -->
        <form id="adminForm" class="space-y-4">
          <div>
            <label class="label" for="admin-email">Official Email</label>
            <input id="admin-email" type="email" class="input-field" placeholder="admin@example.gov" required>
          </div>

          <div>
            <label class="label" for="admin-password">Password</label>
            <input id="admin-password" type="password" class="input-field" placeholder="Choose a strong password" required>
          </div>

          <div>
            <label class="label" for="admin-secret">Admin Secret Key</label>
            <input id="admin-secret" type="password" class="input-field" placeholder="Enter admin secret key" required>
          </div>

          <button type="submit" class="btn-accent">Register as Admin</button>

          <p class="text-center text-sm text-gray-600">Regular user? <a href="signup.html" class="text-link">Register here</a></p>
        </form>

        <p id="msg" class="text-red-600 mt-3 hidden"></p>
      </div>
    </div>
  </div>

  <script>
    // Submit only the fields backend expects: email, password, role=admin, secret_key
    const API_BASE = 'http://localhost:5000/api';
    const form = document.getElementById('adminForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.classList.add('hidden');

      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      const secret_key = document.getElementById('admin-secret').value.trim();

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email, password, role: 'admin', secret_key })
        });
        const data = await res.json();
        if (!res.ok) throw data;

        // Save token + user and redirect to admin dashboard
        localStorage.setItem('bp_token', data.token);
        localStorage.setItem('bp_user', JSON.stringify(data.user));
        location.href = '/admin.html';
      } catch (err) {
        msg.textContent = err.error || 'Admin registration failed';
        msg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
